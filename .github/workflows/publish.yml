name: Publish Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          registry-url: 'https://registry.npmjs.org'

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack, tomlq

      - name: Build
        run: |
          wasm-pack build --target nodejs --out-dir pkg/nodejs/pkg --out-name wasmjieba-nodejs --release
          wasm-pack build --target web --out-dir pkg/web/pkg  --out-name wasmjieba-web --release

      - name: Publish
        run: |
          ./package.sh
          wasm-pack publish pkg/nodejs/pkg
          wasm-pack publish pkg/web/pkg
          wasm-pack publish pkg
